{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Application | Super Safi</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>

.provider-section{
    padding:30px 10% 60px;
    background:#eef4fa;
}

.provider-title{
    text-align:center;
    font-size:50px;
    font-weight:bold;
    color:#1f4d7a;
    margin-bottom:10px;
}
.provider-subtitle{
    text-align:center;
    font-size:20px;
    color:#4d6d8d;
    margin-bottom:25px;
}
        .provider-card{
            background:white;
            border-radius:20px;
            padding:40px;
            max-width:1000px;
            margin:auto;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .section-heading{
            color:#1f4d7a;
            margin-top:25px;
            margin-bottom:20px;
            font-size:28px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .full-width{
            grid-column:1 / -1;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            border:1px solid #d4dce6;
            border-radius:10px;
            font-size:16px;
        }

        textarea{
            min-height:120px;
            resize:vertical;
        }

        .submit-btn{
            margin-top:30px;
            width:100%;
            padding:16px;
            background:#3fa7e0;
            color:white;
            border:none;
            border-radius:12px;
            font-size:20px;
            cursor:pointer;
        }

        .submit-btn:hover{
            opacity:0.9;
        }

        @media(max-width:768px){

            .form-grid{
                grid-template-columns:1fr;
            }

            .provider-title{
                font-size:35px;
            }
        }

    </style>
</head>
<body>

<header class="header">
    <div class="container nav-wrapper">

        <img src="{% static 'img/logo.png' %}" class="logo" alt="Super Safi">

        <button class="menu-toggle" id="menuToggle">☰</button>

        <nav class="nav" id="navMenu">
            <a href="/">Home</a>
            <a href="/about/">About</a>
            <a href="/services/">Services</a>
            <a href="/contact/">Contact</a>
            <a href="/provider-application/">Become a Provider</a>
        </nav>

    </div>
</header>

<section class="provider-section">

    <h1 class="provider-title">
       Become a Service Provider
    </h1>

    <p class="provider-subtitle">
        Join Super Safi and offer professional cleaning services to customers.
    </p>

    

    <div class="provider-card">

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <h2 class="section-heading">
                Personal Information
            </h2>

            <div class="form-grid">

                <input type="text" name="full_name" placeholder="Full Name">

                <input type="tel"
       name="phone"
       placeholder="Phone Number"
       required>

                <input type="text" name="city" placeholder="City">

                <input type="file" name="profile_image">

            </div>

            <h2 class="section-heading">
                Professional Information
            </h2>

            <div class="form-grid">

                <input type="number"
       name="experience_years"
       placeholder="Experience Years"
       min="0"
       max="50"
       required>

                <input type="text" name="tax_number" placeholder="Tax Number">

                <div class="full-width">
                    <textarea name="description"
                        placeholder="Describe your services and experience"></textarea>
                </div>

            </div>

            <h2 class="section-heading">
                Verification Documents
            </h2>

            <div class="form-grid">

                <input type="text"
                       name="commercial_register_number"
                       placeholder="Commercial Register Number">

                <input type="text"
                       name="professional_license_number"
                       placeholder="Professional License Number">

                <input type="file"
                       name="license_file">

                <input type="file"
                       name="commercial_register_file">

            </div>

            <button type="submit" class="submit-btn">
                Submit Application
            </button>

        </form>

    </div>

</section>

</body>
</html>
