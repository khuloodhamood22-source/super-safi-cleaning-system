<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Super Safi</title>

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="header">
  <div class="container nav-wrapper">

    <img src="{% static 'img/logo.png' %}" class="logo" alt="Super Safi">

    <nav class="nav">
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/services/">Services</a>
      <a href="/contact/">Contact</a>
      <a href="/provider-application/">Become a Provider</a>
    </nav>

  </div>
</header>

<section class="contact">

  <form class="contact-form" method="POST">
    {% csrf_token %}

    <h1>Contact & Support</h1>

    <input
      type="text"
      name="name"
      placeholder="Your Name"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Your Email"
      required
    >

    <textarea
      name="message"
      placeholder="Your Message"
      required
    ></textarea>

    <button type="submit" class="btn">
      Send
    </button>

  </form>

</section>
</body>
</html>
