<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Super Safi | Services</title>

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="header">
  <div class="container nav-wrapper">

    <img src="{% static 'img/logo.png' %}" class="logo" alt="Super Safi">

    <button class="menu-toggle" id="menuToggle">☰</button>

    <nav class="nav" id="navMenu">
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/services/">Services</a>
      <a href="/contact/">Contact</a>
      <a href="/provider-application/">Become a Provider</a>
    </nav>

  </div>
</header>

<section class="services-page">
  <div class="container">

    <h1>Our Services</h1>

    <div class="services-flex" id="servicesContainer">
      <!-- Services loaded from API -->
    </div>

  </div>
</section>

<script>
const serviceImages = {
  "Home Cleaning": "{% static 'img/service-1.jpg' %}",
  "Apartment Cleaning": "{% static 'img/service-2.jpg' %}",
  "Office Cleaning": "{% static 'img/service-3.png' %}",
  "Post-Event Cleaning": "{% static 'img/service-4.png' %}"
};

fetch("/api/services/")
  .then(response => response.json())
  .then(services => {

    const container = document.getElementById("servicesContainer");
    container.innerHTML = "";

    services.forEach(service => {

      const imagePath =
        serviceImages[service.name] ||
        "{% static 'img/service-1.jpg' %}";

      container.innerHTML += `
        <div class="card">
          <img src="${imagePath}" alt="${service.name}">
          <h3>${service.name}</h3>
          <p>${service.description}</p>

          <a class="btn"
             href="/booking/?service_id=${service.id}&service_name=${service.name}">
             Book Now
          </a>
        </div>
      `;
    });

  })
  .catch(error => {
    console.error("Error loading services:", error);
  });
</script>

<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
